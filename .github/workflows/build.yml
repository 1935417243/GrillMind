# 构建 Electron 桌面安装包（macOS + Windows）
# 触发方式：手动触发 或 推送 tag（v*）
name: Build Desktop App

on:
  # 手动触发（在 GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:
  # 推送 tag 时自动触发（如 git tag v0.1.0 && git push --tags）
  push:
    tags:
      - 'v*'

# 赋予 workflow 写权限（用于创建 Release）
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 安装根目录依赖（electron、electron-builder 等）
      - name: Install root dependencies
        run: npm install

      # 安装前端依赖
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # 构建前端产物
      - name: Build frontend
        run: npm run build

      # 打包 Electron 应用（--publish never 禁止 electron-builder 自动发布）
      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} --publish never

      # 上传构建产物（所有触发方式都保留 Artifacts）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GrillMind-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.msi
          if-no-files-found: ignore

  # 当通过 tag 触发时，自动创建 GitHub Release 并上传安装包
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # 下载所有平台的构建产物
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: GrillMind-mac
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: GrillMind-win
          path: release-assets

      # 创建 GitHub Release 并上传安装包
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: GrillMind ${{ github.ref_name }}
          body: |
            ## 下载安装包

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `GrillMind-*-arm64.dmg` |
            | Windows | `GrillMind-Setup-*.exe` |

            ### 安装说明
            - **macOS**：双击 `.dmg`，拖到「应用程序」文件夹。首次打开如提示安全警告，请在「系统设置 → 隐私与安全性」中允许。
            - **Windows**：双击 `.exe` 安装向导，一路下一步。首次打开如提示 SmartScreen 警告，点击「更多信息 → 仍要运行」。
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
