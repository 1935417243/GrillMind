# 构建 Electron 桌面安装包（macOS + Windows）
# 触发方式：手动触发 或 推送 tag（v*）
name: Build Desktop App

on:
  # 手动触发（在 GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:
  # 推送 tag 时自动触发（如 git tag v0.1.0 && git push --tags）
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 安装根目录依赖（electron、electron-builder 等）
      - name: Install root dependencies
        run: npm install

      # 安装前端依赖
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      # 构建前端产物
      - name: Build frontend
        run: npm run build

      # 打包 Electron 应用
      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }}
        env:
          # 如果需要 macOS 签名，在 GitHub Secrets 中配置以下变量
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GrillMind-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.msi
          if-no-files-found: ignore
